<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente dourado metálico para os preenchimentos principais -->
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2C94C" />
      <stop offset="30%" stop-color="#F2994A" />
      <stop offset="70%" stop-color="#D4AF37" />
      <stop offset="85%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#F2C94C" />
    </linearGradient>
    <!-- Gradiente de contorno para dar efeito de brilho -->
    <linearGradient id="glow-gradient" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5C3" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8A5A00" />
    </linearGradient>
  </defs>

  <!-- Grupo com estilo dourado -->
  <g fill="url(#gold-gradient)" stroke="url(#glow-gradient)" stroke-width="8" stroke-linejoin="round">
    <!-- Círculo externo incompleto / espiral dourada -->
    <path d="M 230,460 A 210,210 0 1,1 420,330 A 210,210 0 0,1 230,460 Z" fill="none" stroke-width="16" />
    
    <!-- Ramo com folhas (esquerda) -->
    <path d="M 120,350 C 90,260 110,180 180,120 C 140,150 120,200 135,260 C 145,300 170,330 190,340 Z" />
    <path d="M 175,250 C 150,170 180,110 240,70 C 200,90 180,140 195,200 C 205,240 230,270 245,280 Z" />
    <path d="M 195,150 C 185,110 200,80 230,50 C 210,60 195,90 205,120 C 210,140 220,150 230,155 Z" />
    <path d="M 125,290 C 110,320 85,340 70,370 C 70,350 85,320 100,300 Q 112,295 125,290 Z" />

    <!-- Corpo humano estilizado (centro) -->
    <!-- Cabeça -->
    <circle cx="285" cy="200" r="30" />
    <!-- Tronco e membros (braços esticados e pernas) -->
    <path d="M 285,240 C 250,260 210,280 195,290 C 230,275 270,260 285,250 C 300,260 340,275 375,290 C 360,280 320,260 285,240 Z" />
    <path d="M 285,245 L 285,310 C 275,340 250,380 220,410 C 250,370 280,340 285,310 L 290,310 C 295,340 325,370 355,410 C 325,380 300,340 290,310 Z" />
    <!-- Braços erguidos apontando para cima e direita -->
    <path d="M 285,240 Q 320,190 360,150 Q 315,190 285,230 Z" />
    <path d="M 285,240 Q 250,190 210,150 Q 255,190 285,230 Z" />

    <!-- Seta de crescimento/evolução (direita) -->
    <path d="M 220,460 C 260,420 320,340 370,240 L 400,290 L 415,170 L 305,210 L 335,240 C 290,330 240,400 200,440 Z" />
  </g>
</svg>